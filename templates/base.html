<!DOCTYPE html>
<html>
<head>
    <title>Financial AI</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 800px; margin: auto; }
        .nav { margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #ccc; }
        button { padding: 8px 12px; cursor: pointer; }
        input { padding: 8px; width: 80%; }
    </style>
</head>
<body>
    <div class="nav">
        {% if user.is_authenticated %}
            Welcome, <strong>{{ user.username }}</strong>! | 
            <a href="{% url 'document_list' %}">My Documents</a> | 
            <a href="{% url 'chat_window' %}">Chat with AI</a> |
            <form action="{% url 'logout' %}" method="post" style="display:inline;">
                {% csrf_token %}
                <button type="submit" style="background: none; border: none; color: blue; text-decoration: underline; cursor: pointer;">Logout</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}">Login</a> | 
            <a href="{% url 'signup' %}">Signup</a>
        {% endif %}
    </div>
    
    {% block content %}
    {% endblock %}
</body>
</html>
